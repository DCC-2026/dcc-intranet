<!DOCTYPE html>
<html>
<head>
  <title>DCC Intranet</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #1f3b64;
      color: white;
      padding: 15px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 8px;
      margin-top: 5px;
    }

    button {
      cursor: pointer;
      background: #1f3b64;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .task {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    a {
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<header>🏢 DCC Intranet</header>

<div class="container">

  <div class="card">
    <h3>Add Task</h3>
    <input type="text" id="taskInput" placeholder="Enter task..." />
    <input type="file" id="fileInput" />
    <br>
    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="card">
    <h3>To-Do List</h3>
    <div id="taskList"></div>
  </div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const fileInput = document.getElementById("fileInput");

  if (!text) return alert("Enter a task");

  const file = fileInput.files[0];
  let fileURL = null;
  let fileName = null;

  if (file) {
    fileURL = URL.createObjectURL(file);
    fileName = file.name;
  }

  tasks.push({
    text,
    completed: false,
    fileURL,
    fileName
  });

  document.getElementById("taskInput").value = "";
  fileInput.value = "";

  save();
  render();
}

function toggleTask(index) {
  tasks[index].completed = !tasks[index].completed;
  save();
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, i) => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div class="left">
        <input type="checkbox" ${task.completed ? "checked" : ""} 
          onclick="toggleTask(${i})">

        <span class="${task.completed ? "completed" : ""}">
          ${task.text}
        </span>

        ${task.fileURL ? `<a href="${task.fileURL}" target="_blank">📎 ${task.fileName}</a>` : ""}
      </div>

      <button onclick="deleteTask(${i})">❌</button>
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
